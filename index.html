<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

:root{
  --bg:#FCFCFB; --surface:#FFFFFF; --line:#ECEAE6; --line-strong:#D9D6D0;
  --ink:#1C1B19; --mut:#8B8880; --faint:#B8B5AE;
  --accent:#0E6B5C; --accent-soft:#E4F0ED;
  --dodo:#35558F; --bok:#B0574A;
  --warn:#C24A3F; --warn-soft:#F7E9E7;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.5;
  font-variant-numeric:tabular-nums;
}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit; font-size:14px;}

/* ---------- 로그인 ---------- */
#gate{
  position:fixed; inset:0; background:var(--bg); z-index:100;
  display:flex; align-items:center; justify-content:center;
}
.gate-box{width:280px; text-align:center;}
.gate-box .logo{font-size:22px; font-weight:800; letter-spacing:-0.5px; margin-bottom:6px;}
.gate-box .sub{font-size:13px; color:var(--mut); margin-bottom:28px;}
.gate-box input{
  width:100%; padding:12px 14px; border:1px solid var(--line-strong); border-radius:8px;
  font-size:15px; text-align:center; background:var(--surface); outline:none;
}
.gate-box input:focus{border-color:var(--ink);}
.gate-box button{
  width:100%; margin-top:10px; padding:12px; border:none; border-radius:8px;
  background:var(--ink); color:#fff; font-size:14px; font-weight:600;
}
.gate-box .err{margin-top:12px; font-size:13px; color:var(--warn); min-height:18px;}

/* ---------- 레이아웃 ---------- */
header{
  position:sticky; top:0; z-index:50; background:rgba(252,252,251,0.92);
  backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
}
.hd-inner{
  max-width:860px; margin:0 auto; padding:0 20px;
  display:flex; align-items:center; height:56px; gap:24px;
}
.hd-logo{font-weight:800; font-size:16px; letter-spacing:-0.3px;}
nav{display:flex; gap:2px; flex:1;}
nav button{
  background:none; border:none; padding:8px 12px; font-size:14px; color:var(--mut);
  border-radius:6px; font-weight:500;
}
nav button.on{color:var(--ink); font-weight:700; background:var(--surface); box-shadow:0 0 0 1px var(--line);}
.hd-sync{
  background:none; border:1px solid var(--line-strong); border-radius:6px;
  padding:6px 12px; font-size:12px; color:var(--mut);
}
.hd-sync:hover{color:var(--ink);}
main{max-width:860px; margin:0 auto; padding:32px 20px 100px;}
.view{display:none;}
.view.on{display:block;}

/* ---------- 공통 컴포넌트 ---------- */
h2.sec{font-size:13px; font-weight:600; color:var(--mut); letter-spacing:0.4px; margin:36px 0 12px;}
h2.sec:first-child{margin-top:0;}
.card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:20px;}
.num{font-variant-numeric:tabular-nums;}
.dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0;}
.dot.dodo{background:var(--dodo);} .dot.bok{background:var(--bok);} .dot.common{background:var(--faint);}
.tag{font-size:11px; padding:2px 7px; border-radius:4px; background:var(--bg); border:1px solid var(--line); color:var(--mut);}
.btn{
  padding:9px 16px; border-radius:8px; border:none; font-size:13px; font-weight:600;
  background:var(--ink); color:#fff;
}
.btn.ghost{background:none; border:1px solid var(--line-strong); color:var(--ink); font-weight:500;}
.btn.sm{padding:6px 11px; font-size:12px;}
.btn:disabled{opacity:0.35; cursor:default;}
.btn.warn{background:none; border:1px solid var(--warn); color:var(--warn);}
.month-nav{display:flex; align-items:center; gap:10px;}
.month-nav button{background:none; border:1px solid var(--line-strong); border-radius:6px; width:30px; height:30px; font-size:14px; color:var(--mut);}
.month-nav .cur{font-size:17px; font-weight:700; min-width:96px; text-align:center;}
.empty{color:var(--faint); font-size:13px; text-align:center; padding:28px 0;}
.toast{
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#fff; padding:11px 20px; border-radius:8px; font-size:13px;
  opacity:0; transition:opacity .25s; pointer-events:none; z-index:200;
}
.toast.show{opacity:1;}
#loading{
  position:fixed; inset:0; background:rgba(252,252,251,0.7); z-index:90;
  display:none; align-items:center; justify-content:center; font-size:13px; color:var(--mut);
}
#loading.show{display:flex;}

/* ---------- 대시보드 ---------- */
.dash-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;}
.stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:12px;}
.stat{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 18px;}
.stat .lb{font-size:12px; color:var(--mut); margin-bottom:6px;}
.stat .v{font-size:22px; font-weight:800; letter-spacing:-0.5px;}
.stat .v small{font-size:12px; font-weight:500; color:var(--mut); margin-left:2px;}
.stat .d{font-size:12px; margin-top:4px; color:var(--mut);}
.stat .d.over{color:var(--warn);}
.gauge-row{padding:13px 0; border-bottom:1px solid var(--line);}
.gauge-row:last-child{border-bottom:none;}
.gauge-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; font-size:13.5px;}
.gauge-head .r{color:var(--mut); font-size:12.5px;}
.gauge-head .r b{color:var(--ink); font-weight:600;}
.gauge-track{height:5px; background:var(--line); border-radius:3px; overflow:hidden;}
.gauge-fill{height:100%; background:var(--accent); border-radius:3px; transition:width .4s;}
.gauge-fill.over{background:var(--warn);}
.trend{display:flex; align-items:flex-end; gap:10px; height:120px; padding-top:10px;}
.trend .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
.trend .bar{width:100%; max-width:48px; background:var(--ink); border-radius:4px 4px 0 0; min-height:2px;}
.trend .m{font-size:11px; color:var(--mut);}
.trend .a{font-size:11px; color:var(--mut);}
.person-split{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.ps-box{border:1px solid var(--line); border-radius:12px; padding:14px 16px; background:var(--surface);}
.ps-box .h{display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; margin-bottom:6px;}
.ps-box .v{font-size:19px; font-weight:800;}

/* ---------- 계획 ---------- */
.plan-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;}
.plan-toolbar .hint{font-size:12.5px; color:var(--mut);}
.pgroup{margin-bottom:8px; background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
.pg-head{
  display:flex; justify-content:space-between; align-items:center;
  padding:13px 18px; background:var(--bg); border-bottom:1px solid var(--line);
}
.pg-head .t{font-size:14px; font-weight:700;}
.pg-head .s{font-size:13px; font-weight:600; color:var(--mut);}
.prow{
  display:flex; align-items:center; gap:10px; padding:10px 18px;
  border-bottom:1px solid var(--line); font-size:14px;
}
.prow:last-child{border-bottom:none;}
.prow .nm{flex:1; min-width:0;}
.prow .nm .memo{display:block; font-size:11.5px; color:var(--faint);}
.prow input.amt{
  width:104px; text-align:right; border:1px solid transparent; background:none;
  border-radius:6px; padding:5px 8px; font-size:14px; font-variant-numeric:tabular-nums;
}
.prow input.amt:hover{border-color:var(--line-strong);}
.prow input.amt:focus{border-color:var(--ink); outline:none; background:var(--surface);}
.mini-sel{display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden;}
.mini-sel button{background:none; border:none; padding:4px 8px; font-size:11px; color:var(--faint);}
.mini-sel button.on{background:var(--ink); color:#fff;}
.mini-sel button.on.p-dodo{background:var(--dodo);}
.mini-sel button.on.p-bok{background:var(--bok);}
.mini-sel button.on.p-common{background:var(--mut);}
.prow .del{background:none; border:none; color:var(--faint); font-size:15px; padding:2px 4px;}
.prow .del:hover{color:var(--warn);}
.padd{
  width:100%; padding:10px; border:1px dashed var(--line-strong); background:none;
  border-radius:0; color:var(--mut); font-size:12.5px;
}
.padd:hover{color:var(--ink); background:var(--bg);}
.savebar{
  position:fixed; bottom:0; left:0; right:0; background:var(--surface);
  border-top:1px solid var(--line); padding:12px 20px; z-index:60;
  display:none; justify-content:center; gap:12px; align-items:center;
}
.savebar.show{display:flex;}
.savebar .msg{font-size:13px; color:var(--mut);}

/* ---------- 지침 ---------- */
.settle{
  background:var(--ink); color:#fff; border-radius:14px; padding:26px 28px;
  margin-bottom:14px;
}
.settle .lb{font-size:12px; color:rgba(255,255,255,0.55); letter-spacing:0.5px; margin-bottom:10px;}
.settle .flow{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;}
.settle .who{font-size:17px; font-weight:600;}
.settle .arr{color:rgba(255,255,255,0.4);}
.settle .amt{font-size:32px; font-weight:800; letter-spacing:-1px;}
.settle .buf{font-size:12.5px; color:rgba(255,255,255,0.55); margin-top:10px;}
.guide2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.gcard{background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
.gcard .gh{padding:16px 20px 12px; border-bottom:1px solid var(--line);}
.gcard .gh .n{display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700;}
.gcard .gh .inc{font-size:12.5px; color:var(--mut); margin-top:3px;}
.gcard .gb{padding:14px 20px 18px;}
.gstep{font-size:11px; font-weight:600; color:var(--mut); letter-spacing:0.5px; margin:14px 0 6px;}
.gstep:first-child{margin-top:0;}
.gitem{display:flex; justify-content:space-between; font-size:13px; padding:2.5px 0; color:var(--ink);}
.gitem .a{color:var(--mut);}
.gsum{display:flex; justify-content:space-between; font-size:13px; font-weight:700; padding-top:7px; margin-top:5px; border-top:1px solid var(--line);}
.gleft{
  display:flex; justify-content:space-between; align-items:center;
  margin-top:16px; padding:11px 14px; background:var(--bg); border-radius:8px;
  font-size:13.5px; font-weight:700;
}

/* ---------- 입력 ---------- */
.in-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;}
.upload-zone{
  border:1.5px dashed var(--line-strong); border-radius:12px; padding:30px;
  text-align:center; color:var(--mut); font-size:13.5px; background:var(--surface);
}
.upload-zone:hover{border-color:var(--ink); color:var(--ink);}
.upload-zone input{display:none;}
.pick-cards{margin-top:14px;}
.pc-row{
  display:flex; align-items:center; gap:10px; padding:9px 14px;
  border:1px solid var(--line); border-radius:8px; margin-bottom:6px;
  background:var(--surface); font-size:13.5px;
}
.pc-row input[type=checkbox]{width:15px; height:15px; accent-color:var(--ink);}
.pc-row .cnt{margin-left:auto; font-size:12px; color:var(--mut);}
.owner-pick{display:flex; align-items:center; gap:10px; margin:14px 0; font-size:13.5px;}
.preview-wrap{margin-top:16px;}
.pv-row{
  display:flex; align-items:center; gap:8px; padding:8px 12px;
  border-bottom:1px solid var(--line); font-size:12.5px; background:var(--surface);
}
.pv-row.off{opacity:0.35;}
.pv-row input[type=checkbox]{width:14px; height:14px; accent-color:var(--ink); flex-shrink:0;}
.pv-row .dt{color:var(--mut); width:44px; flex-shrink:0;}
.pv-row .ds{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.pv-row .am{width:82px; text-align:right; flex-shrink:0; font-weight:600;}
.pv-row select{
  border:1px solid var(--line); border-radius:5px; padding:3px 5px; font-size:11.5px;
  background:var(--bg); max-width:110px; color:var(--ink);
}
.pv-head{display:flex; justify-content:space-between; align-items:center; padding:10px 2px; font-size:13px; color:var(--mut);}
.manual-form{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
.manual-form .full{grid-column:1/-1;}
.mf-field label{display:block; font-size:11.5px; color:var(--mut); margin-bottom:4px;}
.mf-field input,.mf-field select{
  width:100%; padding:9px 11px; border:1px solid var(--line-strong); border-radius:8px;
  background:var(--surface); outline:none;
}
.mf-field input:focus,.mf-field select:focus{border-color:var(--ink);}
.exp-row{
  display:flex; align-items:center; gap:10px; padding:9px 14px;
  border-bottom:1px solid var(--line); font-size:13px;
}
.exp-row:last-child{border-bottom:none;}
.exp-row .dt{color:var(--mut); width:46px; flex-shrink:0; font-size:12px;}
.exp-row .cat{flex-shrink:0;}
.exp-row .ds{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.exp-row .am{font-weight:600; flex-shrink:0;}
.exp-row .del{background:none; border:none; color:var(--faint); padding:2px 5px; font-size:14px;}
.exp-row .del:hover{color:var(--warn);}

@media (max-width:640px){
  .stat-grid{grid-template-columns:1fr;}
  .guide2{grid-template-columns:1fr;}
  .person-split{grid-template-columns:1fr;}
  .manual-form{grid-template-columns:1fr;}
  nav button{padding:8px 9px; font-size:13px;}
  .hd-inner{gap:12px; padding:0 14px;}
  main{padding:24px 14px 120px;}
  .settle .amt{font-size:26px;}
}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="logo">가계부</div>
    <div class="sub">비밀번호를 입력하세요</div>
    <input type="password" id="gatePw" placeholder="••••••" autocomplete="current-password">
    <button id="gateBtn">들어가기</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<header>
  <div class="hd-inner">
    <div class="hd-logo">가계부</div>
    <nav>
      <button data-v="dash" class="on">대시보드</button>
      <button data-v="plan">계획</button>
      <button data-v="guide">지침</button>
      <button data-v="input">입력</button>
    </nav>
    <button class="hd-sync" id="syncBtn">새로고침</button>
  </div>
</header>

<main>
  <!-- 대시보드 -->
  <div class="view on" id="v-dash">
    <div class="dash-top">
      <div class="month-nav">
        <button id="dashPrev">‹</button>
        <span class="cur" id="dashMonth"></span>
        <button id="dashNext">›</button>
      </div>
    </div>
    <div class="stat-grid" id="dashStats"></div>
    <h2 class="sec">담당별 지출</h2>
    <div class="person-split" id="dashPerson"></div>
    <h2 class="sec">계획 대비 실제 · 대분류</h2>
    <div class="card" id="dashGauges"></div>
    <h2 class="sec">일반지출 세부</h2>
    <div class="card" id="dashDetail"></div>
    <h2 class="sec">월별 추이</h2>
    <div class="card"><div class="trend" id="dashTrend"></div></div>
  </div>

  <!-- 계획 -->
  <div class="view" id="v-plan">
    <div class="plan-toolbar">
      <span class="hint">금액을 눌러 수정 · 토글로 결제수단/담당 변경</span>
    </div>
    <div id="planList"></div>
  </div>

  <!-- 지침 -->
  <div class="view" id="v-guide">
    <div class="settle" id="settleBox"></div>
    <div class="guide2" id="guideCards"></div>
  </div>

  <!-- 입력 -->
  <div class="view" id="v-input">
    <div class="in-top">
      <div class="month-nav">
        <button id="inPrev">‹</button>
        <span class="cur" id="inMonth"></span>
        <button id="inNext">›</button>
      </div>
    </div>

    <h2 class="sec">카드 내역 업로드 (뱅크샐러드)</h2>
    <label class="upload-zone" id="uploadZone">
      뱅크샐러드에서 내려받은 엑셀 파일을 선택하세요
      <input type="file" id="bankFile" accept=".xlsx,.xls">
    </label>
    <div id="bankFlow"></div>

    <h2 class="sec">현금 지출 직접 입력</h2>
    <div class="card">
      <div class="manual-form">
        <div class="mf-field"><label>날짜</label><input type="date" id="mfDate"></div>
        <div class="mf-field"><label>금액 (원)</label><input type="text" id="mfAmt" inputmode="numeric" placeholder="0"></div>
        <div class="mf-field"><label>대분류</label><select id="mfCat"></select></div>
        <div class="mf-field"><label>항목 (선택)</label><select id="mfItem"></select></div>
        <div class="mf-field"><label>담당</label><select id="mfPerson"><option value="dodo">도도</option><option value="bok">복둥</option></select></div>
        <div class="mf-field"><label>메모</label><input type="text" id="mfMemo" placeholder="선택"></div>
        <div class="full" style="display:flex; gap:8px;">
          <button class="btn" id="mfAdd">지출 추가</button>
          <button class="btn ghost" id="mfBulk">이달 현금 계획 일괄 등록</button>
        </div>
      </div>
    </div>

    <h2 class="sec">이번 달 입력된 내역 <span id="expCount" style="font-weight:400;color:var(--faint);"></span></h2>
    <div class="card" style="padding:4px 6px;" id="expList"></div>
  </div>
</main>

<div class="savebar" id="savebar">
  <span class="msg">계획에 저장되지 않은 변경이 있습니다</span>
  <button class="btn" id="savePlanBtn">저장</button>
  <button class="btn ghost" id="discardBtn">되돌리기</button>
</div>

<div class="toast" id="toast"></div>
<div id="loading">불러오는 중…</div>

<script>
/* ================= 설정 ================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbzgwKyrl3oPFfFbeV_wYAKfmc4pHq99GMjqzjJYwJw3wlZN8EuBSN4l1vsf6K4wtihOJQ/exec'; // ← Apps Script 배포 URL로 교체
const START_MONTH = '2026-07';

/* ================= 상태 ================= */
const S = {
  pw: sessionStorage.getItem('bk_pw') || '',
  plan: [], expenses: [],
  dirty: false,
  dashMonth: null, inMonth: null,
  bank: null, // {fileRows, cards:{}, owner, preview:[]}
};
const PERSON_LB = {dodo:'도도', bok:'복둥', common:'공통'};
const won = n => Math.round(n).toLocaleString('ko-KR');

function curMonth(){
  const d = new Date();
  const m = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  return m < START_MONTH ? START_MONTH : m;
}
function shiftMonth(m, delta){
  const [y,mm] = m.split('-').map(Number);
  const d = new Date(y, mm-1+delta, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

/* ================= API ================= */
async function apiRead(pw){
  const r = await fetch(API_URL+'?action=read&pw='+encodeURIComponent(pw));
  return r.json();
}
async function apiPost(action, payload){
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({pw:S.pw, action, payload})
  });
  return r.json();
}
function loading(on){ document.getElementById('loading').classList.toggle('show', on); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

/* ================= 로그인 ================= */
async function tryLogin(pw){
  loading(true);
  try{
    const res = await apiRead(pw);
    loading(false);
    if (!res.ok){ return false; }
    S.pw = pw; sessionStorage.setItem('bk_pw', pw);
    S.plan = res.plan; S.expenses = res.expenses;
    document.getElementById('gate').style.display = 'none';
    initAfterLogin();
    return true;
  }catch(e){
    loading(false);
    document.getElementById('gateErr').textContent = '연결 실패 — API 주소를 확인하세요';

/* ================= 계획 계산 유틸 ================= */
function planCats(){ 
  const seen=[], out=[];
  S.plan.filter(p=>p.kind==='지출').forEach(p=>{ if(!seen.includes(p.cat)){seen.push(p.cat); out.push(p.cat);} });
  return out;
}
function planTotals(){
  const t = {income:0, expense:0, incDodo:0, incBok:0,
    dodo:{card:0,cash:0}, bok:{card:0,cash:0}, common:0, cardSum:0, cashSum:0, byCat:{}};
  S.plan.forEach(p=>{
    if (p.kind==='수입'){ t.income+=p.amt; if(p.person==='dodo')t.incDodo+=p.amt; if(p.person==='bok')t.incBok+=p.amt; return; }
    t.expense += p.amt;
    t.byCat[p.cat] = (t.byCat[p.cat]||0)+p.amt;
    if (p.method==='card') t.cardSum+=p.amt; else t.cashSum+=p.amt;
    if (p.person==='dodo'||p.person==='bok') t[p.person][p.method==='card'?'card':'cash']+=p.amt;
    else t.common+=p.amt;
  });
  return t;
}

/* ================= 대시보드 ================= */
function expOfMonth(m){ return S.expenses.filter(e=>e.month===m); }

function renderDash(){
  const m = S.dashMonth;
  document.getElementById('dashMonth').textContent = m.replace('-','.');
  const t = planTotals();
  const exps = expOfMonth(m);
  const spent = exps.reduce((a,e)=>a+e.amt,0);
  const planLiving = t.expense - (t.byCat['저축']||0); // 저축 제외 소비성 계획
  const pct = t.expense? Math.round(spent/t.expense*100) : 0;

  // 정산 예상: 계획 기준
  const bokBal = t.incBok - (t.bok.card+t.bok.cash);
  const dodoBal = t.incDodo - (t.dodo.card+t.dodo.cash);

  const stats = document.getElementById('dashStats');
  stats.innerHTML = `
    <div class="stat"><div class="lb">이번 달 입력된 지출</div><div class="v num">${won(spent)}<small>원</small></div>
      <div class="d">계획 ${won(t.expense)}원의 ${pct}%</div></div>
    <div class="stat"><div class="lb">계획 잔액 (범퍼)</div><div class="v num">${won(t.income-t.expense)}<small>원</small></div>
      <div class="d">수입 ${won(t.income)} − 계획지출 ${won(t.expense)}</div></div>
    <div class="stat"><div class="lb">월말 정산 (계획 기준)</div>
      <div class="v num">${bokBal>=0?'복둥→도도':'도도→복둥'} ${won(Math.abs(bokBal))}<small>원</small></div>
      <div class="d">정산 후 도도 보유 ${won(dodoBal+bokBal)}원</div></div>`;

  // 담당별 실제
  const pd = exps.filter(e=>e.person==='dodo').reduce((a,e)=>a+e.amt,0);
  const pb = exps.filter(e=>e.person==='bok').reduce((a,e)=>a+e.amt,0);
  document.getElementById('dashPerson').innerHTML = `
    <div class="ps-box"><div class="h"><span class="dot dodo"></span>도도</div><div class="v num">${won(pd)}원</div></div>
    <div class="ps-box"><div class="h"><span class="dot bok"></span>복둥</div><div class="v num">${won(pb)}원</div></div>`;

  // 대분류 게이지
  const cats = planCats();
  const actualByCat = {};
  exps.forEach(e=>{ actualByCat[e.cat]=(actualByCat[e.cat]||0)+e.amt; });
  let gh = '';
  cats.forEach(c=>{
    const plan = t.byCat[c]||0, act = actualByCat[c]||0;
    if (plan===0 && act===0) return;
    const p = plan? Math.min(act/plan*100,100):100;
    const over = plan>0 && act>plan;
    gh += `<div class="gauge-row">
      <div class="gauge-head"><span>${c}</span><span class="r"><b>${won(act)}</b> / ${won(plan)}원${over?' · <b style="color:var(--warn)">초과</b>':''}</span></div>
      <div class="gauge-track"><div class="gauge-fill${over?' over':''}" style="width:${plan?Math.min(act/plan*100,100):(act>0?100:0)}%"></div></div>
    </div>`;
  });
  // 계획에 없는 대분류(기타 등)
  Object.keys(actualByCat).forEach(c=>{
    if (cats.includes(c)) return;
    gh += `<div class="gauge-row">
      <div class="gauge-head"><span>${c}</span><span class="r"><b>${won(actualByCat[c])}</b>원 (계획 외)</span></div>
      <div class="gauge-track"><div class="gauge-fill over" style="width:100%"></div></div></div>`;
  });
  document.getElementById('dashGauges').innerHTML = gh || '<div class="empty">아직 입력된 지출이 없습니다</div>';

  // 일반지출 세부 (항목별)
  const genItems = S.plan.filter(p=>p.kind==='지출' && p.cat==='일반지출');
  const actualByItem = {};
  exps.filter(e=>e.cat==='일반지출').forEach(e=>{
    const k = e.item || '(항목 미지정)';
    actualByItem[k]=(actualByItem[k]||0)+e.amt;
  });
  let dh='';
  genItems.forEach(it=>{
    const act = actualByItem[it.name]||0;
    const over = act>it.amt;
    dh += `<div class="gauge-row">
      <div class="gauge-head"><span>${it.name}</span><span class="r"><b>${won(act)}</b> / ${won(it.amt)}원</span></div>
      <div class="gauge-track"><div class="gauge-fill${over?' over':''}" style="width:${Math.min(act/it.amt*100,100)}%"></div></div></div>`;
  });
  if (actualByItem['(항목 미지정)']){
    dh += `<div class="gauge-row"><div class="gauge-head"><span>항목 미지정</span><span class="r"><b>${won(actualByItem['(항목 미지정)'])}</b>원</span></div></div>`;
  }
  document.getElementById('dashDetail').innerHTML = dh || '<div class="empty">일반지출 입력 없음</div>';

  // 월별 추이
  const months = [...new Set(S.expenses.map(e=>e.month))].sort();
  let th='';
  if (months.length){
    const sums = months.map(mm=>S.expenses.filter(e=>e.month===mm).reduce((a,e)=>a+e.amt,0));
    const max = Math.max(...sums,1);
    months.forEach((mm,i)=>{
      th += `<div class="col"><span class="a num">${Math.round(sums[i]/10000)}만</span>
        <div class="bar" style="height:${Math.max(sums[i]/max*100,2)}%"></div>
        <span class="m">${mm.slice(2).replace('-','.')}</span></div>`;
    });
  }
  document.getElementById('dashTrend').innerHTML = th || '<div class="empty" style="width:100%">데이터 없음</div>';
}

/* ================= 입력: 뱅크샐러드 ================= */
const BANK_MAP = [
  // [뱅샐대분류, 뱅샐소분류(null=전체), 계획대분류, 계획항목]
  ['식비', null, '일반지출', '식비 (외식)'],
  ['술/유흥', null, '일반지출', '식비 (외식)'],
  ['카페/간식', null, '일반지출', '식비 (외식)'],
  ['생활', null, '일반지출', '마트'],
  ['온라인쇼핑', '서비스구독', '구독', ''],
  ['온라인쇼핑', null, '일반지출', '쇼핑'],
  ['패션/쇼핑', null, '일반지출', '쇼핑'],
  ['자동차', '주유', '일반지출', '전기차 충전'],
  ['자동차', null, '기타', ''],
  ['주거/통신', '관리비', '생활비', '관리비'],
  ['주거/통신', '가스비', '생활비', '가스비'],
  ['주거/통신', '인터넷', '통신비', '인터넷비'],
  ['주거/통신', '휴대폰', '통신비', ''],
  ['주거/통신', null, '생활비', ''],
  ['교육', null, '교육', '교육비'],
  ['금융', '보험', '보험', ''],
  ['금융', null, '기타', ''],
];
function mapBank(cat, sub){
  for (const [c,s,pc,pi] of BANK_MAP){
    if (c===cat && (s===null || s===sub)) return {cat:pc, item:pi};
  }
  return {cat:'기타', item:''};
}

document.getElementById('bankFile').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
      // 헤더 행 탐색
      let hi = raw.findIndex(r=>r && r.includes('날짜') && r.includes('금액'));
      if (hi<0){ toast('뱅크샐러드 양식을 인식하지 못했습니다'); return; }
      const head = raw[hi];
      const idx = k=>head.indexOf(k);
      const rows = [];
      for (let i=hi+1;i<raw.length;i++){
        const r = raw[i]; if(!r||!r[idx('날짜')]) continue;
        const amt = Number(String(r[idx('금액')]).replace(/,/g,''));
        if (isNaN(amt)) continue;
        rows.push({
          date: String(r[idx('날짜')]).slice(0,10),
          cat: String(r[idx('대분류')]||''),
          sub: String(r[idx('소분류')]||''),
          desc: String(r[idx('내용')]||''),
          amt,
          card: String(r[idx('결제수단')]||''),
        });
      }
      // 지출(음수)만, 선택한 월만
      const monthRows = rows.filter(r=>r.date.startsWith(S.inMonth) && r.amt<0);
      if (!monthRows.length){ toast(`${S.inMonth.replace('-','.')} 지출 데이터가 없습니다`); return; }
      const cards = {};
      monthRows.forEach(r=>{ cards[r.card]=(cards[r.card]||0)+1; });
      S.bank = { rows: monthRows, cards, checked:Object.fromEntries(Object.keys(cards).map(c=>[c,true])), owner:'dodo', preview:null };
      renderBankFlow();
    }catch(err){ toast('파일을 읽는 중 오류가 발생했습니다'); }
  };
  reader.readAsArrayBuffer(f);
  e.target.value='';
});

function renderBankFlow(){
  const box = document.getElementById('bankFlow');
  if (!S.bank){ box.innerHTML=''; return; }
  const b = S.bank;

  if (!b.preview){
    // 1단계: 카드 선택 + 소유자
    const existing = S.expenses.filter(e=>e.month===S.inMonth && e.source==='bank').length;
    let h = '<div class="pick-cards">';
    if (existing) h += `<div style="font-size:12.5px;color:var(--warn);margin-bottom:10px;">이 달에 이미 카드 내역 ${existing}건이 저장되어 있습니다 — 중복 업로드에 주의하세요</div>`;
    h += `<div style="font-size:13px;color:var(--mut);margin-bottom:8px;">가져올 카드를 선택하세요</div>`;
    Object.entries(b.cards).forEach(([c,n])=>{
      h += `<label class="pc-row"><input type="checkbox" data-card="${c}" ${b.checked[c]?'checked':''}> ${c}<span class="cnt">${n}건</span></label>`;
    });
    h += `</div>
      <div class="owner-pick">이 내역의 담당:
        <div class="mini-sel">
          <button data-o="dodo" class="${b.owner==='dodo'?'on p-dodo':''}">도도</button>
          <button data-o="bok" class="${b.owner==='bok'?'on p-bok':''}">복둥</button>
        </div>
        <button class="btn sm" id="bankNext" style="margin-left:auto;">다음 — 미리보기</button>
      </div>`;
    box.innerHTML = h;
    box.querySelectorAll('input[data-card]').forEach(ch=>{
      ch.addEventListener('change',()=>{ b.checked[ch.dataset.card]=ch.checked; });
    });
    box.querySelectorAll('button[data-o]').forEach(bt=>{
      bt.addEventListener('click',()=>{ b.owner=bt.dataset.o; renderBankFlow(); });
    });
    document.getElementById('bankNext').addEventListener('click',()=>{
      const sel = b.rows.filter(r=>b.checked[r.card]);
      if(!sel.length){ toast('선택된 카드가 없습니다'); return; }
      b.preview = sel.map(r=>{
        const m = mapBank(r.cat, r.sub);
        return { on:true, date:r.date, desc:r.desc, amt:-r.amt, card:r.card, cat:m.cat, item:m.item };
      });
      renderBankFlow();
    });
    return;
  }

  // 2단계: 미리보기
  const cats = [...planCats(), '기타'];
  const total = b.preview.filter(p=>p.on).reduce((a,p)=>a+p.amt,0);
  let h = `<div class="preview-wrap">
    <div class="pv-head"><span>${b.preview.filter(p=>p.on).length}건 · ${won(total)}원 · 담당 ${PERSON_LB[b.owner]}</span>
    <span><button class="btn ghost sm" id="bankBack">뒤로</button> <button class="btn sm" id="bankSave">저장</button></span></div>
    <div class="card" style="padding:0; overflow:hidden;">`;
  b.preview.forEach((p,i)=>{
    const itemsOf = c => S.plan.filter(x=>x.kind==='지출'&&x.cat===c).map(x=>x.name);
    h += `<div class="pv-row${p.on?'':' off'}">
      <input type="checkbox" data-i="${i}" ${p.on?'checked':''}>
      <span class="dt">${p.date.slice(5)}</span>
      <span class="ds" title="${p.desc}">${p.desc}</span>
      <select data-cat="${i}">${cats.map(c=>`<option ${c===p.cat?'selected':''}>${c}</option>`).join('')}</select>
      <select data-item="${i}"><option value="">항목없음</option>${itemsOf(p.cat).map(n=>`<option ${n===p.item?'selected':''}>${n}</option>`).join('')}</select>
      <span class="am num">${won(p.amt)}</span>
    </div>`;
  });
  h += '</div></div>';
  box.innerHTML = h;
  box.querySelectorAll('input[data-i]').forEach(ch=>{
    ch.addEventListener('change',()=>{ b.preview[ch.dataset.i].on=ch.checked; renderBankFlow(); });
  });
  box.querySelectorAll('select[data-cat]').forEach(se=>{
    se.addEventListener('change',()=>{ const p=b.preview[se.dataset.cat]; p.cat=se.value; p.item=''; renderBankFlow(); });
  });
  box.querySelectorAll('select[data-item]').forEach(se=>{
    se.addEventListener('change',()=>{ b.preview[se.dataset.item].item=se.value; });
  });
  document.getElementById('bankBack').addEventListener('click',()=>{ b.preview=null; renderBankFlow(); });
  document.getElementById('bankSave').addEventListener('click', async ()=>{
    const rows = b.preview.filter(p=>p.on).map(p=>({
      id: crypto.randomUUID(), month:S.inMonth, date:p.date,
      cat:p.cat, item:p.item, desc:p.desc, amt:p.amt,
      method:p.card, person:b.owner, source:'bank', memo:''
    }));
    if(!rows.length){ toast('저장할 내역이 없습니다'); return; }
    loading(true);
    const res = await apiPost('addExpenses', rows);
    loading(false);
    if(res.ok){ S.expenses.push(...rows); S.bank=null; renderInput(); renderDash(); toast(`${rows.length}건 저장 완료`); }
    else toast('저장 실패');
  });
}

/* ================= 입력: 현금 ================= */
function fillMfCat(){
  const catSel = document.getElementById('mfCat');
  const cats = [...planCats(),'기타'];
  catSel.innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
  fillMfItem();
  catSel.onchange = fillMfItem;
}
function fillMfItem(){
  const c = document.getElementById('mfCat').value;
  const items = S.plan.filter(p=>p.kind==='지출'&&p.cat===c).map(p=>p.name);
  document.getElementById('mfItem').innerHTML = '<option value="">항목없음</option>'+items.map(n=>`<option>${n}</option>`).join('');
}
document.getElementById('mfAdd').addEventListener('click', async ()=>{
  const amt = Number(String(document.getElementById('mfAmt').value).replace(/,/g,''))||0;
  if(!amt){ toast('금액을 입력하세요'); return; }
  const row = {
    id: crypto.randomUUID(), month:S.inMonth,
    date: document.getElementById('mfDate').value || S.inMonth+'-01',
    cat: document.getElementById('mfCat').value,
    item: document.getElementById('mfItem').value,
    desc: document.getElementById('mfItem').value || document.getElementById('mfCat').value,
    amt, method:'현금',
    person: document.getElementById('mfPerson').value,
    source:'manual', memo: document.getElementById('mfMemo').value
  };
  loading(true);
  const res = await apiPost('addExpenses', [row]);
  loading(false);
  if(res.ok){ S.expenses.push(row); document.getElementById('mfAmt').value=''; document.getElementById('mfMemo').value=''; renderExpList(); renderDash(); toast('추가 완료'); }
});
document.getElementById('mfBulk').addEventListener('click', async ()=>{
  const cashPlans = S.plan.filter(p=>p.kind==='지출'&&p.method==='cash');
  if(!confirm(`계획된 현금 지출 ${cashPlans.length}건(총 ${won(cashPlans.reduce((a,p)=>a+p.amt,0))}원)을 ${S.inMonth.replace('-','.')}월에 일괄 등록할까요?`)) return;
  const rows = cashPlans.map(p=>({
    id: crypto.randomUUID(), month:S.inMonth, date:S.inMonth+'-01',
    cat:p.cat, item:p.name, desc:p.name, amt:p.amt, method:'현금',
    person: p.person==='common'?'dodo':p.person, source:'manual', memo:'계획 일괄등록'
  }));
  loading(true);
  const res = await apiPost('addExpenses', rows);
  loading(false);
  if(res.ok){ S.expenses.push(...rows); renderExpList(); renderDash(); toast(`${rows.length}건 등록 완료`); }
});

function renderExpList(){
  const list = expOfMonth(S.inMonth).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('expCount').textContent = list.length?`· ${list.length}건 ${won(list.reduce((a,e)=>a+e.amt,0))}원`:'';
  const box = document.getElementById('expList');
  if(!list.length){ box.innerHTML='<div class="empty">입력된 내역이 없습니다</div>'; return; }
  box.innerHTML = list.map(e=>`
    <div class="exp-row">
      <span class="dt num">${e.date.slice(5)}</span>
      <span class="tag cat">${e.cat}${e.item?' · '+e.item:''}</span>
      <span class="ds">${e.desc}</span>
      <span class="dot ${e.person}"></span>
      <span class="am num">${won(e.amt)}</span>
      <button class="del" data-id="${e.id}">×</button>
    </div>`).join('');
  box.querySelectorAll('.del').forEach(bt=>{
    bt.addEventListener('click', async ()=>{
      if(!confirm('이 내역을 삭제할까요?')) return;
      loading(true);
      const res = await apiPost('deleteExpenses', [bt.dataset.id]);
      loading(false);
      if(res.ok){ S.expenses = S.expenses.filter(e=>e.id!==bt.dataset.id); renderExpList(); renderDash(); toast('삭제 완료'); }
    });
  });
}

/* ================= 자동 로그인 시도 ================= */
if (S.pw) tryLogin(S.pw);
