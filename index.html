<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Budget Plan</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

:root{
  --bg:#FCFCFB; --surface:#FFFFFF; --line:#ECEAE6; --line-strong:#D9D6D0;
  --ink:#1C1B19; --mut:#8B8880; --faint:#B8B5AE;
  --accent:#0E6B5C; --accent-soft:#E4F0ED;
  --dodo:#35558F; --bok:#B0574A;
  --warn:#C24A3F; --good:#0E6B5C;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.5; font-variant-numeric:tabular-nums;
}
button{font-family:inherit; cursor:pointer;}
input,select{font-family:inherit; font-size:14px;}

/* ---------- 로그인 ---------- */
#gate{position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center;}
.gate-box{width:300px; text-align:center;}
.gate-box .logo{font-size:20px; font-weight:800; letter-spacing:-0.4px; margin-bottom:4px;}
.gate-box .sub{font-size:13px; color:var(--mut); margin-bottom:28px;}
.gate-box input{width:100%; padding:12px 14px; border:1px solid var(--line-strong); border-radius:8px; font-size:15px; text-align:center; background:var(--surface); outline:none;}
.gate-box input:focus{border-color:var(--ink);}
.gate-box button{width:100%; margin-top:10px; padding:12px; border:none; border-radius:8px; background:var(--ink); color:#fff; font-size:14px; font-weight:600;}
.gate-box .err{margin-top:12px; font-size:13px; color:var(--warn); min-height:18px;}

/* ---------- 레이아웃 ---------- */
header{position:sticky; top:0; z-index:50; background:rgba(252,252,251,0.92); backdrop-filter:blur(8px); border-bottom:1px solid var(--line);}
.hd-inner{max-width:880px; margin:0 auto; padding:0 20px; display:flex; align-items:center; height:56px; gap:20px;}
.hd-logo{font-weight:800; font-size:15px; letter-spacing:-0.3px; white-space:nowrap;}
nav{display:flex; gap:2px; flex:1;}
nav button{background:none; border:none; padding:8px 12px; font-size:14px; color:var(--mut); border-radius:6px; font-weight:500;}
nav button.on{color:var(--ink); font-weight:700; background:var(--surface); box-shadow:0 0 0 1px var(--line);}
.hd-sync{background:none; border:1px solid var(--line-strong); border-radius:6px; padding:6px 12px; font-size:12px; color:var(--mut);}
.hd-sync:hover{color:var(--ink);}
main{max-width:880px; margin:0 auto; padding:28px 20px 110px;}
.view{display:none;}
.view.on{display:block;}

h2.sec{font-size:13px; font-weight:600; color:var(--mut); letter-spacing:0.4px; margin:34px 0 12px;}
h2.sec:first-child{margin-top:0;}
.card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:20px;}
.num{font-variant-numeric:tabular-nums;}
.dot{width:7px; height:7px; border-radius:50%; display:inline-block; flex-shrink:0;}
.dot.dodo{background:var(--dodo);} .dot.bok{background:var(--bok);} .dot.common{background:var(--faint);}
.tag{font-size:11px; padding:2px 7px; border-radius:4px; background:var(--bg); border:1px solid var(--line); color:var(--mut); white-space:nowrap;}
.btn{padding:9px 16px; border-radius:8px; border:none; font-size:13px; font-weight:600; background:var(--ink); color:#fff;}
.btn.ghost{background:none; border:1px solid var(--line-strong); color:var(--ink); font-weight:500;}
.btn.sm{padding:6px 11px; font-size:12px;}
.btn:disabled{opacity:0.35; cursor:default;}
.month-nav{display:flex; align-items:center; gap:10px;}
.month-nav button{background:none; border:1px solid var(--line-strong); border-radius:6px; width:30px; height:30px; font-size:14px; color:var(--mut);}
.month-nav .cur{font-size:17px; font-weight:700; min-width:96px; text-align:center;}
.empty{color:var(--faint); font-size:13px; text-align:center; padding:28px 0;}
.toast{position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:11px 20px; border-radius:8px; font-size:13px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:200;}
.toast.show{opacity:1;}
#loading{position:fixed; inset:0; background:rgba(252,252,251,0.7); z-index:90; display:none; align-items:center; justify-content:center; font-size:13px; color:var(--mut);}
#loading.show{display:flex;}

/* ---------- 계획: 요약 스트립 ---------- */
.flowbar{
  background:var(--ink); color:#fff; border-radius:14px; padding:22px 26px; margin-bottom:10px;
  display:flex; align-items:center; gap:18px; flex-wrap:wrap;
}
.flowbar .fb{flex:1; min-width:120px;}
.flowbar .fb .l{font-size:11.5px; color:rgba(255,255,255,0.5); letter-spacing:0.4px; margin-bottom:5px;}
.flowbar .fb .v{font-size:22px; font-weight:800; letter-spacing:-0.6px;}
.flowbar .fb .v small{font-size:12px; font-weight:400; color:rgba(255,255,255,0.5);}
.flowbar .op{color:rgba(255,255,255,0.3); font-size:20px; font-weight:300;}
.flowbar .fb.buf .v{color:#8FD4C4;}
.substrip{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:26px;}
.substrip .ss{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:11px 14px;}
.substrip .ss .l{font-size:11px; color:var(--mut); display:flex; align-items:center; gap:5px; margin-bottom:3px;}
.substrip .ss .v{font-size:15px; font-weight:700;}


/* ---------- 계획: 장표 뷰 ---------- */
.plan-bar{display:flex; justify-content:space-between; align-items:center; margin:2px 0 6px; gap:10px; flex-wrap:wrap;}
.filters{display:flex; gap:6px; flex-wrap:wrap;}
.fchip{font-size:12px; padding:6px 12px; border:1px solid var(--line-strong); background:none; color:var(--mut); border-radius:99px; font-weight:500;}
.fchip.on{background:var(--ink); color:#fff; border-color:var(--ink);}
.fchip.on.f-dodo{background:var(--dodo); border-color:var(--dodo);}
.fchip.on.f-bok{background:var(--bok); border-color:var(--bok);}
.empty-plan{padding:34px 20px; text-align:center; color:var(--mut); font-size:13.5px; line-height:1.8;}
.pbar-row{display:grid; grid-template-columns:88px 1fr 96px; align-items:center; gap:12px; padding:6px 0; font-size:13px;}
.pbar-row .t{font-weight:500;}
.pbar-row .track{height:12px; background:var(--line); border-radius:3px; overflow:hidden;}
.pbar-row .fill{height:100%; background:var(--accent); border-radius:3px;}
.pbar-row .v{text-align:right; color:var(--mut); font-size:12.5px;}
.vrow{display:flex; align-items:center; gap:10px; padding:9px 18px; border-bottom:1px solid var(--line); font-size:14px;}
.vrow:last-of-type{border-bottom:none;}
.vrow .nm{flex:1; min-width:0;}
.vrow .nm .memo{display:block; font-size:11.5px; color:var(--faint);}
.vrow .badges{display:flex; gap:5px; align-items:center; flex-shrink:0;}
.vrow .amt-v{font-weight:600; min-width:96px; text-align:right; font-variant-numeric:tabular-nums;}
.pg-head .split{font-size:11.5px; color:var(--faint); font-weight:400; margin-left:8px;}

/* ---------- 계획: 그룹 ---------- */
.plan-hint{font-size:12.5px; color:var(--mut); margin-bottom:14px;}
.pgroup{margin-bottom:8px; background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
.pg-head{display:flex; justify-content:space-between; align-items:center; padding:13px 18px; background:var(--bg); border-bottom:1px solid var(--line);}
.pg-head .t{font-size:14px; font-weight:700;}
.pg-head .s{font-size:13px; font-weight:600; color:var(--mut);}
.prow{display:flex; align-items:center; gap:10px; padding:10px 18px; border-bottom:1px solid var(--line); font-size:14px;}
.prow:last-of-type{border-bottom:none;}
.prow .nm{flex:1; min-width:0;}
.prow .nm .memo{display:block; font-size:11.5px; color:var(--faint);}
.prow input.amt{width:104px; text-align:right; border:1px solid transparent; background:none; border-radius:6px; padding:5px 8px; font-size:14px; font-variant-numeric:tabular-nums;}
.prow input.amt:hover{border-color:var(--line-strong);}
.prow input.amt:focus{border-color:var(--ink); outline:none; background:var(--surface);}
.mini-sel{display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden;}
.mini-sel button{background:none; border:none; padding:4px 8px; font-size:11px; color:var(--faint);}
.mini-sel button.on{background:var(--ink); color:#fff;}
.mini-sel button.on.p-dodo{background:var(--dodo);}
.mini-sel button.on.p-bok{background:var(--bok);}
.mini-sel button.on.p-common{background:var(--mut);}
.prow .del{background:none; border:none; color:var(--faint); font-size:15px; padding:2px 4px;}
.prow .del:hover{color:var(--warn);}
.padd{width:100%; padding:10px; border:none; border-top:1px dashed var(--line-strong); background:none; color:var(--mut); font-size:12.5px;}
.padd:hover{color:var(--ink); background:var(--bg);}
.savebar{position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--line); padding:12px 20px; z-index:60; display:none; justify-content:center; gap:12px; align-items:center;}
.savebar.show{display:flex;}
.savebar .msg{font-size:13px; color:var(--mut);}

/* ---------- 지침 ---------- */
.settle{background:var(--ink); color:#fff; border-radius:14px; padding:26px 28px; margin-bottom:14px;}
.settle .lb{font-size:12px; color:rgba(255,255,255,0.55); letter-spacing:0.5px; margin-bottom:10px;}
.settle .flow{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;}
.settle .who{font-size:17px; font-weight:600;}
.settle .arr{color:rgba(255,255,255,0.4);}
.settle .amt{font-size:32px; font-weight:800; letter-spacing:-1px;}
.settle .buf{font-size:12.5px; color:rgba(255,255,255,0.55); margin-top:10px;}
.guide2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.gcard{background:var(--surface); border:1px solid var(--line); border-radius:12px; overflow:hidden;}
.gcard .gh{padding:16px 20px 12px; border-bottom:1px solid var(--line);}
.gcard .gh .n{display:flex; align-items:center; gap:8px; font-size:15px; font-weight:700;}
.gcard .gh .inc{font-size:12.5px; color:var(--mut); margin-top:3px;}
.gcard .gb{padding:14px 20px 18px;}
.gstep{font-size:11px; font-weight:600; color:var(--mut); letter-spacing:0.5px; margin:14px 0 6px;}
.gstep:first-child{margin-top:0;}
.gitem{display:flex; justify-content:space-between; font-size:13px; padding:2.5px 0;}
.gitem .a{color:var(--mut);}
.gsum{display:flex; justify-content:space-between; font-size:13px; font-weight:700; padding-top:7px; margin-top:5px; border-top:1px solid var(--line);}
.gleft{display:flex; justify-content:space-between; align-items:center; margin-top:16px; padding:11px 14px; background:var(--bg); border-radius:8px; font-size:13.5px; font-weight:700;}

/* ---------- 리뷰 ---------- */
.rv-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;}
.stat-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:8px;}
.stat{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:16px 18px;}
.stat .lb{font-size:12px; color:var(--mut); margin-bottom:6px;}
.stat .v{font-size:22px; font-weight:800; letter-spacing:-0.5px;}
.stat .v small{font-size:12px; font-weight:500; color:var(--mut); margin-left:2px;}
.stat .d{font-size:12px; margin-top:4px; color:var(--mut);}
.stat .v.warn{color:var(--warn);}
.rv-table{width:100%; border-collapse:collapse; font-size:13.5px;}
.rv-table th{font-size:11.5px; font-weight:600; color:var(--mut); text-align:right; padding:0 8px 10px; border-bottom:1px solid var(--line);}
.rv-table th:first-child{text-align:left; padding-left:0;}
.rv-table td{padding:10px 8px; border-bottom:1px solid var(--line); text-align:right;}
.rv-table td:first-child{text-align:left; padding-left:0; font-weight:500;}
.rv-table tr:last-child td{border-bottom:none;}
.rv-table .diff-over{color:var(--warn); font-weight:600;}
.rv-table .diff-under{color:var(--good);}
.rv-table .gtrack{height:4px; background:var(--line); border-radius:2px; margin-top:6px; overflow:hidden;}
.rv-table .gfill{height:100%; background:var(--accent); border-radius:2px;}
.rv-table .gfill.over{background:var(--warn);}
.gauge-row{padding:13px 0; border-bottom:1px solid var(--line);}
.gauge-row:last-child{border-bottom:none;}
.gauge-head{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:7px; font-size:13.5px;}
.gauge-head .r{color:var(--mut); font-size:12.5px;}
.gauge-head .r b{color:var(--ink); font-weight:600;}
.gauge-track{height:5px; background:var(--line); border-radius:3px; overflow:hidden;}
.gauge-fill{height:100%; background:var(--accent); border-radius:3px;}
.gauge-fill.over{background:var(--warn);}
.person-split{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.ps-box{border:1px solid var(--line); border-radius:12px; padding:14px 16px; background:var(--surface);}
.ps-box .h{display:flex; align-items:center; gap:7px; font-size:13px; font-weight:600; margin-bottom:6px;}
.ps-box .v{font-size:19px; font-weight:800;}
.trend{display:flex; align-items:flex-end; gap:10px; height:120px; padding-top:10px;}
.trend .col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
.trend .bar{width:100%; max-width:48px; background:var(--ink); border-radius:4px 4px 0 0; min-height:2px;}
.trend .m,.trend .a{font-size:11px; color:var(--mut);}

/* ---------- 입력 ---------- */
.in-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;}
.upload-zone{display:block; border:1.5px dashed var(--line-strong); border-radius:12px; padding:28px; text-align:center; color:var(--mut); font-size:13.5px; background:var(--surface); cursor:pointer;}
.upload-zone:hover{border-color:var(--ink); color:var(--ink);}
.upload-zone input{display:none;}
.pick-cards{margin-top:14px;}
.pc-row{display:flex; align-items:center; gap:10px; padding:9px 14px; border:1px solid var(--line); border-radius:8px; margin-bottom:6px; background:var(--surface); font-size:13.5px; cursor:pointer;}
.pc-row input[type=checkbox]{width:15px; height:15px; accent-color:var(--ink);}
.pc-row .cnt{margin-left:auto; font-size:12px; color:var(--mut);}
.owner-pick{display:flex; align-items:center; gap:10px; margin:14px 0; font-size:13.5px; flex-wrap:wrap;}
.pv-row{display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--line); font-size:12.5px; background:var(--surface);}
.pv-row.off{opacity:0.35;}
.pv-row input[type=checkbox]{width:14px; height:14px; accent-color:var(--ink); flex-shrink:0;}
.pv-row .dt{color:var(--mut); width:42px; flex-shrink:0;}
.pv-row .ds{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.pv-row .am{width:80px; text-align:right; flex-shrink:0; font-weight:600;}
.pv-row select{border:1px solid var(--line); border-radius:5px; padding:3px 5px; font-size:11.5px; background:var(--bg); max-width:108px; color:var(--ink);}
.pv-head{display:flex; justify-content:space-between; align-items:center; padding:10px 2px; font-size:13px; color:var(--mut); flex-wrap:wrap; gap:8px;}
.manual-form{display:grid; grid-template-columns:repeat(2,1fr); gap:10px;}
.manual-form .full{grid-column:1/-1;}
.mf-field label{display:block; font-size:11.5px; color:var(--mut); margin-bottom:4px;}
.mf-field input,.mf-field select{width:100%; padding:9px 11px; border:1px solid var(--line-strong); border-radius:8px; background:var(--surface); outline:none;}
.mf-field input:focus,.mf-field select:focus{border-color:var(--ink);}
.exp-row{display:flex; align-items:center; gap:10px; padding:9px 14px; border-bottom:1px solid var(--line); font-size:13px;}
.exp-row:last-child{border-bottom:none;}
.exp-row .dt{color:var(--mut); width:44px; flex-shrink:0; font-size:12px;}
.exp-row .ds{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.exp-row .am{font-weight:600; flex-shrink:0;}
.exp-row .del{background:none; border:none; color:var(--faint); padding:2px 5px; font-size:14px;}
.exp-row .del:hover{color:var(--warn);}

@media (max-width:640px){
  .stat-grid{grid-template-columns:1fr;}
  .guide2{grid-template-columns:1fr;}
  .person-split{grid-template-columns:1fr;}
  .manual-form{grid-template-columns:1fr;}
  .substrip{grid-template-columns:repeat(2,1fr);}
  .flowbar{padding:18px 20px; gap:12px;}
  .flowbar .fb .v{font-size:18px;}
  nav button{padding:8px 8px; font-size:13px;}
  .hd-inner{gap:10px; padding:0 12px;}
  .hd-logo{font-size:13px;}
  main{padding:22px 14px 130px;}
  .settle .amt{font-size:26px;}
  .rv-table th:nth-child(4),.rv-table td:nth-child(4){display:none;}
}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="logo">Family Budget Plan</div>
    <div class="sub">비밀번호를 입력하세요</div>
    <input type="password" id="gatePw" placeholder="••••••" autocomplete="current-password">
    <button id="gateBtn">들어가기</button>
    <div class="err" id="gateErr"></div>
  </div>
</div>

<header>
  <div class="hd-inner">
    <div class="hd-logo">Family Budget Plan</div>
    <nav>
      <button data-v="plan" class="on">계획</button>
      <button data-v="guide">지침</button>
      <button data-v="review">리뷰</button>
      <button data-v="input">입력</button>
    </nav>
    <button class="hd-sync" id="syncBtn">새로고침</button>
  </div>
</header>

<main>
  <!-- 1. 계획 -->
  <div class="view on" id="v-plan">
    <div class="flowbar" id="planFlow"></div>
    <div class="substrip" id="planSub"></div>
    <div class="plan-bar">
      <div class="filters" id="planFilters"></div>
      <button class="btn ghost sm" id="planEditBtn">편집</button>
    </div>
    <div id="planEmpty" style="display:none;" class="card empty-plan"></div>
    <h2 class="sec" id="planChartTitle">지출 구성</h2>
    <div class="card" id="planChart"></div>
    <h2 class="sec">계획 상세</h2>
    <div id="planList"></div>
  </div>

  <!-- 2. 지침 -->
  <div class="view" id="v-guide">
    <div class="settle" id="settleBox"></div>
    <div class="guide2" id="guideCards"></div>
  </div>

  <!-- 3. 리뷰 -->
  <div class="view" id="v-review">
    <div class="rv-top">
      <div class="month-nav">
        <button id="rvPrev">‹</button>
        <span class="cur" id="rvMonth"></span>
        <button id="rvNext">›</button>
      </div>
    </div>
    <div class="stat-grid" id="rvStats"></div>
    <h2 class="sec">계획 대비 실제 · 대분류</h2>
    <div class="card" style="padding:16px 20px;"><table class="rv-table" id="rvTable"></table></div>
    <h2 class="sec">일반지출 세부</h2>
    <div class="card" id="rvDetail"></div>
    <h2 class="sec">담당별 지출</h2>
    <div class="person-split" id="rvPerson"></div>
    <h2 class="sec">월별 추이</h2>
    <div class="card"><div class="trend" id="rvTrend"></div></div>
  </div>

  <!-- 4. 입력 -->
  <div class="view" id="v-input">
    <div class="in-top">
      <div class="month-nav">
        <button id="inPrev">‹</button>
        <span class="cur" id="inMonth"></span>
        <button id="inNext">›</button>
      </div>
    </div>

    <h2 class="sec">카드 내역 업로드 (뱅크샐러드)</h2>
    <label class="upload-zone" id="uploadZone">
      뱅크샐러드에서 내려받은 엑셀 파일을 선택하세요
      <input type="file" id="bankFile" accept=".xlsx,.xls">
    </label>
    <div id="bankFlow"></div>

    <h2 class="sec">현금 지출 직접 입력</h2>
    <div class="card">
      <div class="manual-form">
        <div class="mf-field"><label>날짜</label><input type="date" id="mfDate"></div>
        <div class="mf-field"><label>금액 (원)</label><input type="text" id="mfAmt" inputmode="numeric" placeholder="0"></div>
        <div class="mf-field"><label>대분류</label><select id="mfCat"></select></div>
        <div class="mf-field"><label>항목 (선택)</label><select id="mfItem"></select></div>
        <div class="mf-field"><label>담당</label><select id="mfPerson"><option value="dodo">도도</option><option value="bok">복둥</option></select></div>
        <div class="mf-field"><label>메모</label><input type="text" id="mfMemo" placeholder="선택"></div>
        <div class="full" style="display:flex; gap:8px; flex-wrap:wrap;">
          <button class="btn" id="mfAdd">지출 추가</button>
          <button class="btn ghost" id="mfBulk">이달 현금 계획 일괄 등록</button>
        </div>
      </div>
    </div>

    <h2 class="sec">이번 달 입력된 내역 <span id="expCount" style="font-weight:400;color:var(--faint);"></span></h2>
    <div class="card" style="padding:4px 6px;" id="expList"></div>
  </div>
</main>

<div class="savebar" id="savebar">
  <span class="msg">계획에 저장되지 않은 변경이 있습니다</span>
  <button class="btn" id="savePlanBtn">저장</button>
  <button class="btn ghost" id="discardBtn">되돌리기</button>
</div>

<div class="toast" id="toast"></div>
<div id="loading">불러오는 중…</div>

<script>
/* ================= 설정 ================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbzyU0ZD06XdLBGI0Mrw8cDKzBUvDJEyXROD_YWanL4-VfrS-SrFnVSeV9Pqe_ftoBrkHw/exec'; // ← Apps Script 배포 URL로 교체
const START_MONTH = '2026-07';

/* ================= 상태 ================= */
const S = {
  pw: sessionStorage.getItem('bk_pw') || '',
  plan: [], expenses: [],
  dirty: false,
  rvMonth: null, inMonth: null,
  bank: null,
  planEdit: false, planFilter: '전체',
};
const PERSON_LB = {dodo:'도도', bok:'복둥', common:'공통'};
const won = n => Math.round(n).toLocaleString('ko-KR');

function curMonth(){
  const d = new Date();
  const m = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
  return m < START_MONTH ? START_MONTH : m;
}
function shiftMonth(m, delta){
  const [y,mm] = m.split('-').map(Number);
  const d = new Date(y, mm-1+delta, 1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

/* ================= API ================= */
async function apiRead(pw){
  const r = await fetch(API_URL+'?action=read&pw='+encodeURIComponent(pw));
  return r.json();
}
async function apiPost(action, payload){
  const r = await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({pw:S.pw, action, payload})
  });
  return r.json();
}
function loading(on){ document.getElementById('loading').classList.toggle('show', on); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

/* ================= 로그인 ================= */
async function tryLogin(pw){
  loading(true);
  try{
    const res = await apiRead(pw);
    loading(false);
    if (!res.ok){
      if(res.error==='SHEET_MISSING') document.getElementById('gateErr').textContent = '시트 오류: '+(res.detail||'');
      return false;
    }
    S.pw = pw; sessionStorage.setItem('bk_pw', pw);
    S.plan = res.plan; S.expenses = res.expenses;
    document.getElementById('gate').style.display = 'none';
    S.rvMonth = curMonth(); S.inMonth = curMonth();
    renderAll();
    return true;
  }catch(e){
    loading(false);
    document.getElementById('gateErr').textContent = '연결 실패 — 네트워크 또는 API 주소를 확인하세요';
    return false;
  }
}
document.getElementById('gateBtn').addEventListener('click', async ()=>{
  const pw = document.getElementById('gatePw').value;
  const ok = await tryLogin(pw);
  if (!ok && !document.getElementById('gateErr').textContent) document.getElementById('gateErr').textContent = '비밀번호가 올바르지 않습니다';
});
document.getElementById('gatePw').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('gateBtn').click(); });

function renderAll(){ renderPlan(); renderGuide(); renderReview(); renderInput(); }

document.getElementById('syncBtn').addEventListener('click', async ()=>{
  if (S.dirty && !confirm('저장되지 않은 계획 변경이 사라집니다. 계속할까요?')) return;
  loading(true);
  const res = await apiRead(S.pw);
  loading(false);
  if (res.ok){ S.plan=res.plan; S.expenses=res.expenses; S.dirty=false; updateSavebar(); renderAll(); toast('최신 데이터로 갱신됨'); }
  else toast('갱신 실패');
});

/* ================= 탭 ================= */
document.querySelectorAll('nav button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
    document.getElementById('v-'+b.dataset.v).classList.add('on');
  });
});

/* ================= 계산 유틸 ================= */
function planCats(){
  const seen=[], out=[];
  S.plan.filter(p=>p.kind==='지출').forEach(p=>{ if(!seen.includes(p.cat)){seen.push(p.cat); out.push(p.cat);} });
  return out;
}
function planTotals(){
  const t = {income:0, expense:0, incDodo:0, incBok:0,
    dodo:{card:0,cash:0}, bok:{card:0,cash:0}, common:0, cardSum:0, cashSum:0, byCat:{}};
  S.plan.forEach(p=>{
    if (p.kind==='수입'){ t.income+=p.amt; if(p.person==='dodo')t.incDodo+=p.amt; if(p.person==='bok')t.incBok+=p.amt; return; }
    t.expense += p.amt;
    t.byCat[p.cat] = (t.byCat[p.cat]||0)+p.amt;
    if (p.method==='card') t.cardSum+=p.amt; else t.cashSum+=p.amt;
    if (p.person==='dodo'||p.person==='bok') t[p.person][p.method==='card'?'card':'cash']+=p.amt;
    else t.common+=p.amt;
  });
  return t;
}
function expOfMonth(m){ return S.expenses.filter(e=>e.month===m); }

/* ================= 1. 계획 ================= */
function updateSavebar(){ document.getElementById('savebar').classList.toggle('show', S.dirty); }
function markDirty(){ S.dirty=true; updateSavebar(); }

function renderPlan(){
  const t = planTotals();
  document.getElementById('planFlow').innerHTML = `
    <div class="fb"><div class="l">월 수입</div><div class="v num">${won(t.income)}<small> 원</small></div></div>
    <span class="op">−</span>
    <div class="fb"><div class="l">계획 지출 (저축 포함)</div><div class="v num">${won(t.expense)}<small> 원</small></div></div>
    <span class="op">=</span>
    <div class="fb buf"><div class="l">잔액 · 범퍼자금</div><div class="v num">${won(t.income-t.expense)}<small> 원</small></div></div>`;
  document.getElementById('planSub').innerHTML = `
    <div class="ss"><div class="l">카드 합계</div><div class="v num">${won(t.cardSum)}</div></div>
    <div class="ss"><div class="l">현금(이체) 합계</div><div class="v num">${won(t.cashSum)}</div></div>
    <div class="ss"><div class="l"><span class="dot dodo"></span>도도 부담</div><div class="v num">${won(t.dodo.card+t.dodo.cash)}</div></div>
    <div class="ss"><div class="l"><span class="dot bok"></span>복둥 부담</div><div class="v num">${won(t.bok.card+t.bok.cash)}</div></div>`;

  // 빈 데이터 안내
  const emptyBox = document.getElementById('planEmpty');
  if (!S.plan.length){
    emptyBox.style.display = 'block';
    emptyBox.innerHTML = `계획 데이터가 비어 있습니다.<br>
      구글 시트의 <b>계획</b> 탭에 데이터가 있는지 확인하세요.<br>
      <span style="font-size:12px;color:var(--faint);">1행은 헤더, 2행부터 데이터 · 결제수단은 card/cash · 담당은 dodo/bok/common (영문)<br>
      붙여넣기 시 한 셀에 몰렸다면: 데이터 → 텍스트를 열로 분할 → 탭</span>`;
    document.getElementById('planChart').innerHTML = '<div class="empty">데이터 없음</div>';
    document.getElementById('planList').innerHTML = '';
    document.getElementById('planFilters').innerHTML = '';
    return;
  }
  emptyBox.style.display = 'none';

  // 담당 필터
  const ff = document.getElementById('planFilters');
  ff.innerHTML = '';
  [['전체','전체',''],['dodo','도도','f-dodo'],['bok','복둥','f-bok'],['common','공통','']].forEach(([v,l,cls])=>{
    const b = document.createElement('button');
    b.className = 'fchip' + (S.planFilter===v?(' on '+cls):'');
    b.textContent = l;
    b.onclick = ()=>{ S.planFilter=v; renderPlan(); };
    ff.appendChild(b);
  });

  // 편집 버튼
  const eb = document.getElementById('planEditBtn');
  eb.textContent = S.planEdit ? '보기로 돌아가기' : '편집';
  eb.onclick = ()=>{ S.planEdit=!S.planEdit; renderPlan(); };

  // 지출 구성 비중 바
  const chart = document.getElementById('planChart');
  const cats = planCats();
  const sorted = cats.map(c=>({c, v:t.byCat[c]||0})).sort((a,b)=>b.v-a.v).filter(x=>x.v>0);
  const maxV = Math.max(...sorted.map(x=>x.v),1);
  chart.innerHTML = sorted.map(x=>`
    <div class="pbar-row"><span class="t">${x.c}</span>
      <div class="track"><div class="fill" style="width:${x.v/maxV*100}%"></div></div>
      <span class="v num">${won(x.v)}</span></div>`).join('');
  document.getElementById('planChartTitle').style.display = S.planEdit?'none':'block';
  chart.style.display = S.planEdit?'none':'block';

  // 목록: 보기 or 편집
  const wrap = document.getElementById('planList');
  wrap.innerHTML = '';
  const pf = S.planFilter;
  const matches = p => pf==='전체' || p.person===pf;
  const groups = [{key:'수입', items:S.plan.filter(p=>p.kind==='수입')}];
  cats.forEach(c=>groups.push({key:c, items:S.plan.filter(p=>p.kind==='지출'&&p.cat===c)}));

  groups.forEach(g=>{
    const visible = g.items.filter(matches);
    if (!S.planEdit && !visible.length) return;
    const div = document.createElement('div');
    div.className='pgroup';
    const items = S.planEdit ? g.items : visible;
    const sub = items.reduce((a,p)=>a+p.amt,0);
    const cardSub = items.filter(p=>p.method==='card'&&p.kind==='지출').reduce((a,p)=>a+p.amt,0);
    const cashSub = items.filter(p=>p.method==='cash'&&p.kind==='지출').reduce((a,p)=>a+p.amt,0);
    const splitTxt = g.key==='수입' ? '' : `<span class="split">카드 ${won(cardSub)} · 현금 ${won(cashSub)}</span>`;
    div.innerHTML = `<div class="pg-head"><span class="t">${g.key}${splitTxt}</span><span class="s num">${won(sub)}원</span></div>`;

    items.forEach(p=>{
      if (S.planEdit){
        div.appendChild(buildEditRow(p));
      } else {
        const row = document.createElement('div');
        row.className='vrow';
        row.innerHTML = `
          <div class="nm">${p.name}${p.memo?`<span class="memo">${p.memo}</span>`:''}</div>
          <div class="badges">
            ${p.kind==='지출'?`<span class="tag">${p.method==='card'?'카드':'현금'}</span>`:''}
            <span class="dot ${p.person}"></span><span class="tag">${PERSON_LB[p.person]||p.person}</span>
          </div>
          <span class="amt-v num">${won(p.amt)}</span>`;
        div.appendChild(row);
      }
    });

    if (S.planEdit){
      const add=document.createElement('button'); add.className='padd'; add.textContent='+ 항목 추가';
      add.onclick=()=>{
        const name=prompt(`[${g.key}] 항목 이름`); if(!name)return;
        const amt=Number(String(prompt('금액(원)')||'').replace(/,/g,''))||0;
        S.plan.push({kind: g.key==='수입'?'수입':'지출', cat:g.key, name, amt, method:'card', person:'dodo', memo:''});
        markDirty(); renderPlan(); renderGuide();
      };
      div.appendChild(add);
    }
    wrap.appendChild(div);
  });
}

function buildEditRow(p){
  const row = document.createElement('div');
  row.className='prow';
  const nm = document.createElement('div'); nm.className='nm';
  nm.innerHTML = `${p.name}${p.memo?`<span class="memo">${p.memo}</span>`:''}`;
  row.appendChild(nm);

  if (p.kind==='지출'){
    const ms = document.createElement('div'); ms.className='mini-sel';
    [['card','카드'],['cash','현금']].forEach(([v,l])=>{
      const b=document.createElement('button'); b.textContent=l;
      if(p.method===v)b.classList.add('on');
      b.onclick=()=>{p.method=v; markDirty(); renderPlan(); renderGuide();};
      ms.appendChild(b);
    });
    row.appendChild(ms);
  }
  const ps = document.createElement('div'); ps.className='mini-sel';
  [['dodo','도도'],['bok','복둥'],['common','공통']].forEach(([v,l])=>{
    const b=document.createElement('button'); b.textContent=l;
    if(p.person===v)b.classList.add('on','p-'+v);
    b.onclick=()=>{p.person=v; markDirty(); renderPlan(); renderGuide();};
    ps.appendChild(b);
  });
  row.appendChild(ps);

  const inp = document.createElement('input');
  inp.className='amt num'; inp.value = won(p.amt);
  inp.addEventListener('focus',()=>{inp.value=p.amt;});
  inp.addEventListener('blur',()=>{
    const v = Number(String(inp.value).replace(/,/g,''))||0;
    if (v!==p.amt){p.amt=v; markDirty(); renderPlan(); renderGuide();}
    else inp.value=won(p.amt);
  });
  row.appendChild(inp);

  const del=document.createElement('button'); del.className='del'; del.textContent='×';
  del.onclick=()=>{ if(confirm(`'${p.name}' 항목을 삭제할까요?`)){ S.plan.splice(S.plan.indexOf(p),1); markDirty(); renderPlan(); renderGuide(); } };
  row.appendChild(del);
  return row;
}

document.getElementById('savePlanBtn').addEventListener('click', async ()=>{
  loading(true);
  const res = await apiPost('savePlan', S.plan);
  loading(false);
  if(res.ok){ S.dirty=false; updateSavebar(); toast('계획 저장 완료 (이전 버전은 계획_백업 탭에 보관)'); }
  else toast('저장 실패: '+(res.detail||res.error||''));
});
document.getElementById('discardBtn').addEventListener('click', async ()=>{
  loading(true);
  const res = await apiRead(S.pw);
  loading(false);
  if(res.ok){ S.plan=res.plan; S.dirty=false; updateSavebar(); renderAll(); }
});

/* ================= 2. 지침 ================= */
function renderGuide(){
  const t = planTotals();
  const dodoBal = t.incDodo - (t.dodo.card+t.dodo.cash);
  const bokBal = t.incBok - (t.bok.card+t.bok.cash);
  const from = bokBal>=0?'복둥':'도도', to = bokBal>=0?'도도':'복둥';
  document.getElementById('settleBox').innerHTML = `
    <div class="lb">월말 정산 — 잔여를 도도에게 모아 가계 버퍼로 관리</div>
    <div class="flow"><span class="who">${from}</span><span class="arr">→</span><span class="who">${to}</span><span class="amt num">${won(Math.abs(bokBal))}원</span></div>
    <div class="buf">정산 후 도도 보유 버퍼 ${won(dodoBal+bokBal)}원 · 공통 항목은 결제한 사람 부담</div>`;

  const wrap = document.getElementById('guideCards');
  wrap.innerHTML='';
  [['dodo', t.incDodo, t.dodo, dodoBal],['bok', t.incBok, t.bok, bokBal]].forEach(([pk, inc, tt, bal])=>{
    const cardItems = S.plan.filter(p=>p.kind==='지출'&&p.person===pk&&p.method==='card');
    const cashItems = S.plan.filter(p=>p.kind==='지출'&&p.person===pk&&p.method==='cash');
    const c = document.createElement('div'); c.className='gcard';
    let h = `<div class="gh"><div class="n"><span class="dot ${pk}"></span>${PERSON_LB[pk]}</div>
      <div class="inc num">① 수입 ${won(inc)}원 입금</div></div><div class="gb">`;
    h += `<div class="gstep">② 카드 결제분 — 별도 이체 없이 카드로 사용</div>`;
    h += cardItems.map(p=>`<div class="gitem"><span>${p.name}</span><span class="a num">${won(p.amt)}</span></div>`).join('') || '<div class="gitem"><span style="color:var(--faint)">없음</span></div>';
    h += `<div class="gsum"><span>카드 소계</span><span class="num">${won(tt.card)}원</span></div>`;
    h += `<div class="gstep">③ 계좌이체 — 직접 보내기 (저축 포함)</div>`;
    h += cashItems.map(p=>`<div class="gitem"><span>${p.name}</span><span class="a num">${won(p.amt)}</span></div>`).join('') || '<div class="gitem"><span style="color:var(--faint)">없음</span></div>';
    h += `<div class="gsum"><span>이체 소계</span><span class="num">${won(tt.cash)}원</span></div>`;
    h += `<div class="gleft"><span>④ 잔여 (수입 − 지출)</span><span class="num">${won(bal)}원</span></div></div>`;
    c.innerHTML = h;
    wrap.appendChild(c);
  });
}

/* ================= 3. 리뷰 ================= */
function renderReview(){
  const m = S.rvMonth;
  document.getElementById('rvMonth').textContent = m.replace('-','.');
  const t = planTotals();
  const exps = expOfMonth(m);
  const spent = exps.reduce((a,e)=>a+e.amt,0);
  const pct = t.expense? Math.round(spent/t.expense*100):0;

  const actualByCat = {};
  exps.forEach(e=>{ actualByCat[e.cat]=(actualByCat[e.cat]||0)+e.amt; });
  const cats = planCats();
  const overCats = cats.filter(c=>(actualByCat[c]||0) > (t.byCat[c]||0) && (t.byCat[c]||0)>0);

  document.getElementById('rvStats').innerHTML = `
    <div class="stat"><div class="lb">이 달 지출 합계</div><div class="v num">${won(spent)}<small>원</small></div>
      <div class="d">${exps.length}건 입력됨</div></div>
    <div class="stat"><div class="lb">계획 대비</div><div class="v num${pct>100?' warn':''}">${pct}<small>%</small></div>
      <div class="d">계획 ${won(t.expense)}원</div></div>
    <div class="stat"><div class="lb">예산 초과 대분류</div><div class="v num${overCats.length?' warn':''}">${overCats.length}<small>개</small></div>
      <div class="d">${overCats.length? overCats.join(', ') : '모두 계획 내'}</div></div>`;

  // 비교 테이블
  let th = `<tr><th>대분류</th><th>계획</th><th>실제</th><th>차이</th></tr>`;
  const rowsHtml = [];
  cats.forEach(c=>{
    const plan = t.byCat[c]||0, act = actualByCat[c]||0;
    if (plan===0 && act===0) return;
    const diff = act - plan;
    const over = plan>0 && diff>0;
    const w = plan? Math.min(act/plan*100,100) : (act>0?100:0);
    rowsHtml.push(`<tr><td>${c}
        <div class="gtrack"><div class="gfill${over?' over':''}" style="width:${w}%"></div></div></td>
      <td class="num">${won(plan)}</td>
      <td class="num">${won(act)}</td>
      <td class="num ${diff>0?'diff-over':(diff<0?'diff-under':'')}">${diff>0?'+':''}${won(diff)}</td></tr>`);
  });
  Object.keys(actualByCat).forEach(c=>{
    if (cats.includes(c)) return;
    rowsHtml.push(`<tr><td>${c} <span class="tag">계획 외</span></td><td class="num">0</td>
      <td class="num">${won(actualByCat[c])}</td><td class="num diff-over">+${won(actualByCat[c])}</td></tr>`);
  });
  document.getElementById('rvTable').innerHTML = rowsHtml.length? th+rowsHtml.join('') :
    th+`<tr><td colspan="4" style="text-align:center;color:var(--faint);padding:24px;">아직 입력된 지출이 없습니다 — 입력 탭에서 카드 내역을 올려보세요</td></tr>`;

  // 일반지출 세부
  const genItems = S.plan.filter(p=>p.kind==='지출' && p.cat==='일반지출');
  const actualByItem = {};
  exps.filter(e=>e.cat==='일반지출').forEach(e=>{
    const k = e.item || '(항목 미지정)';
    actualByItem[k]=(actualByItem[k]||0)+e.amt;
  });
  let dh='';
  genItems.forEach(it=>{
    const act = actualByItem[it.name]||0;
    const over = act>it.amt;
    dh += `<div class="gauge-row">
      <div class="gauge-head"><span>${it.name}</span><span class="r"><b>${won(act)}</b> / ${won(it.amt)}원${over?' · <b style="color:var(--warn)">초과</b>':''}</span></div>
      <div class="gauge-track"><div class="gauge-fill${over?' over':''}" style="width:${it.amt?Math.min(act/it.amt*100,100):0}%"></div></div></div>`;
  });
  if (actualByItem['(항목 미지정)']){
    dh += `<div class="gauge-row"><div class="gauge-head"><span>항목 미지정</span><span class="r"><b>${won(actualByItem['(항목 미지정)'])}</b>원</span></div></div>`;
  }
  document.getElementById('rvDetail').innerHTML = dh || '<div class="empty">일반지출 입력 없음</div>';

  // 담당별
  const pd = exps.filter(e=>e.person==='dodo').reduce((a,e)=>a+e.amt,0);
  const pb = exps.filter(e=>e.person==='bok').reduce((a,e)=>a+e.amt,0);
  document.getElementById('rvPerson').innerHTML = `
    <div class="ps-box"><div class="h"><span class="dot dodo"></span>도도</div><div class="v num">${won(pd)}원</div></div>
    <div class="ps-box"><div class="h"><span class="dot bok"></span>복둥</div><div class="v num">${won(pb)}원</div></div>`;

  // 월별 추이
  const months = [...new Set(S.expenses.map(e=>e.month))].sort();
  let trh='';
  if (months.length){
    const sums = months.map(mm=>S.expenses.filter(e=>e.month===mm).reduce((a,e)=>a+e.amt,0));
    const max = Math.max(...sums,1);
    months.forEach((mm,i)=>{
      trh += `<div class="col"><span class="a num">${Math.round(sums[i]/10000)}만</span>
        <div class="bar" style="height:${Math.max(sums[i]/max*100,2)}%"></div>
        <span class="m">${mm.slice(2).replace('-','.')}</span></div>`;
    });
  }
  document.getElementById('rvTrend').innerHTML = trh || '<div class="empty" style="width:100%">데이터 없음</div>';
}
document.getElementById('rvPrev').addEventListener('click',()=>{S.rvMonth=shiftMonth(S.rvMonth,-1);renderReview();});
document.getElementById('rvNext').addEventListener('click',()=>{S.rvMonth=shiftMonth(S.rvMonth,1);renderReview();});

/* ================= 4. 입력 ================= */
const BANK_MAP = [
  ['식비', null, '일반지출', '식비 (외식)'],
  ['술/유흥', null, '일반지출', '식비 (외식)'],
  ['카페/간식', null, '일반지출', '식비 (외식)'],
  ['생활', null, '일반지출', '마트'],
  ['온라인쇼핑', '서비스구독', '구독', ''],
  ['온라인쇼핑', null, '일반지출', '쇼핑'],
  ['패션/쇼핑', null, '일반지출', '쇼핑'],
  ['자동차', '주유', '일반지출', '전기차 충전'],
  ['자동차', null, '기타', ''],
  ['주거/통신', '관리비', '생활비', '관리비'],
  ['주거/통신', '가스비', '생활비', '가스비'],
  ['주거/통신', '인터넷', '통신비', '인터넷비'],
  ['주거/통신', '휴대폰', '통신비', ''],
  ['주거/통신', null, '생활비', ''],
  ['교육', null, '교육', '교육비'],
  ['금융', '보험', '보험', ''],
  ['금융', null, '기타', ''],
];
function mapBank(cat, sub){
  for (const [c,s,pc,pi] of BANK_MAP){
    if (c===cat && (s===null || s===sub)) return {cat:pc, item:pi};
  }
  return {cat:'기타', item:''};
}

function renderInput(){
  document.getElementById('inMonth').textContent = S.inMonth.replace('-','.');
  document.getElementById('mfDate').value = S.inMonth+'-01';
  fillMfCat();
  renderExpList();
  renderBankFlow();
}
document.getElementById('inPrev').addEventListener('click',()=>{S.inMonth=shiftMonth(S.inMonth,-1);S.bank=null;renderInput();});
document.getElementById('inNext').addEventListener('click',()=>{S.inMonth=shiftMonth(S.inMonth,1);S.bank=null;renderInput();});

document.getElementById('bankFile').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const wb = XLSX.read(new Uint8Array(ev.target.result), {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, raw:false});
      let hi = raw.findIndex(r=>r && r.includes('날짜') && r.includes('금액'));
      if (hi<0){ toast('뱅크샐러드 양식을 인식하지 못했습니다'); return; }
      const head = raw[hi];
      const idx = k=>head.indexOf(k);
      const rows = [];
      for (let i=hi+1;i<raw.length;i++){
        const r = raw[i]; if(!r||!r[idx('날짜')]) continue;
        const amt = Number(String(r[idx('금액')]).replace(/,/g,''));
        if (isNaN(amt)) continue;
        rows.push({
          date: String(r[idx('날짜')]).slice(0,10),
          cat: String(r[idx('대분류')]||''),
          sub: String(r[idx('소분류')]||''),
          desc: String(r[idx('내용')]||''),
          amt,
          card: String(r[idx('결제수단')]||''),
        });
      }
      const monthRows = rows.filter(r=>r.date.startsWith(S.inMonth) && r.amt<0);
      if (!monthRows.length){ toast(`${S.inMonth.replace('-','.')} 지출 데이터가 없습니다 — 상단에서 월을 확인하세요`); return; }
      const cards = {};
      monthRows.forEach(r=>{ cards[r.card]=(cards[r.card]||0)+1; });
      S.bank = { rows: monthRows, cards, checked:Object.fromEntries(Object.keys(cards).map(c=>[c,true])), owner:'dodo', preview:null };
      renderBankFlow();
    }catch(err){ toast('파일을 읽는 중 오류가 발생했습니다'); }
  };
  reader.readAsArrayBuffer(f);
  e.target.value='';
});

function renderBankFlow(){
  const box = document.getElementById('bankFlow');
  if (!S.bank){ box.innerHTML=''; return; }
  const b = S.bank;

  if (!b.preview){
    const existing = S.expenses.filter(e=>e.month===S.inMonth && e.source==='bank').length;
    let h = '<div class="pick-cards">';
    if (existing) h += `<div style="font-size:12.5px;color:var(--warn);margin-bottom:10px;">이 달에 이미 카드 내역 ${existing}건이 저장되어 있습니다 — 중복 업로드에 주의하세요</div>`;
    h += `<div style="font-size:13px;color:var(--mut);margin-bottom:8px;">가져올 카드를 선택하세요</div>`;
    Object.entries(b.cards).forEach(([c,n])=>{
      h += `<label class="pc-row"><input type="checkbox" data-card="${c}" ${b.checked[c]?'checked':''}> ${c}<span class="cnt">${n}건</span></label>`;
    });
    h += `</div>
      <div class="owner-pick">이 내역의 담당:
        <div class="mini-sel">
          <button data-o="dodo" class="${b.owner==='dodo'?'on p-dodo':''}">도도</button>
          <button data-o="bok" class="${b.owner==='bok'?'on p-bok':''}">복둥</button>
        </div>
        <button class="btn sm" id="bankNext" style="margin-left:auto;">다음 — 미리보기</button>
      </div>`;
    box.innerHTML = h;
    box.querySelectorAll('input[data-card]').forEach(ch=>{
      ch.addEventListener('change',()=>{ b.checked[ch.dataset.card]=ch.checked; });
    });
    box.querySelectorAll('button[data-o]').forEach(bt=>{
      bt.addEventListener('click',()=>{ b.owner=bt.dataset.o; renderBankFlow(); });
    });
    document.getElementById('bankNext').addEventListener('click',()=>{
      const sel = b.rows.filter(r=>b.checked[r.card]);
      if(!sel.length){ toast('선택된 카드가 없습니다'); return; }
      b.preview = sel.map(r=>{
        const m = mapBank(r.cat, r.sub);
        return { on:true, date:r.date, desc:r.desc, amt:-r.amt, card:r.card, cat:m.cat, item:m.item };
      });
      renderBankFlow();
    });
    return;
  }

  const cats = [...planCats(), '기타'];
  const total = b.preview.filter(p=>p.on).reduce((a,p)=>a+p.amt,0);
  let h = `<div class="preview-wrap">
    <div class="pv-head"><span>${b.preview.filter(p=>p.on).length}건 · ${won(total)}원 · 담당 ${PERSON_LB[b.owner]}</span>
    <span><button class="btn ghost sm" id="bankBack">뒤로</button> <button class="btn sm" id="bankSave">저장</button></span></div>
    <div class="card" style="padding:0; overflow:hidden;">`;
  b.preview.forEach((p,i)=>{
    const itemsOf = c => S.plan.filter(x=>x.kind==='지출'&&x.cat===c).map(x=>x.name);
    h += `<div class="pv-row${p.on?'':' off'}">
      <input type="checkbox" data-i="${i}" ${p.on?'checked':''}>
      <span class="dt">${p.date.slice(5)}</span>
      <span class="ds" title="${p.desc}">${p.desc}</span>
      <select data-cat="${i}">${cats.map(c=>`<option ${c===p.cat?'selected':''}>${c}</option>`).join('')}</select>
      <select data-item="${i}"><option value="">항목없음</option>${itemsOf(p.cat).map(n=>`<option ${n===p.item?'selected':''}>${n}</option>`).join('')}</select>
      <span class="am num">${won(p.amt)}</span>
    </div>`;
  });
  h += '</div></div>';
  box.innerHTML = h;
  box.querySelectorAll('input[data-i]').forEach(ch=>{
    ch.addEventListener('change',()=>{ b.preview[ch.dataset.i].on=ch.checked; renderBankFlow(); });
  });
  box.querySelectorAll('select[data-cat]').forEach(se=>{
    se.addEventListener('change',()=>{ const p=b.preview[se.dataset.cat]; p.cat=se.value; p.item=''; renderBankFlow(); });
  });
  box.querySelectorAll('select[data-item]').forEach(se=>{
    se.addEventListener('change',()=>{ b.preview[se.dataset.item].item=se.value; });
  });
  document.getElementById('bankBack').addEventListener('click',()=>{ b.preview=null; renderBankFlow(); });
  document.getElementById('bankSave').addEventListener('click', async ()=>{
    const rows = b.preview.filter(p=>p.on).map(p=>({
      id: crypto.randomUUID(), month:S.inMonth, date:p.date,
      cat:p.cat, item:p.item, desc:p.desc, amt:p.amt,
      method:p.card, person:b.owner, source:'bank', memo:''
    }));
    if(!rows.length){ toast('저장할 내역이 없습니다'); return; }
    loading(true);
    const res = await apiPost('addExpenses', rows);
    loading(false);
    if(res.ok){ S.expenses.push(...rows); S.bank=null; renderInput(); renderReview(); toast(`${res.count}건 저장 완료${res.skipped?` (중복 ${res.skipped}건 제외)`:''}`); }
    else toast('저장 실패: '+(res.detail||res.error||''));
  });
}

/* ---- 현금 ---- */
function fillMfCat(){
  const catSel = document.getElementById('mfCat');
  const cats = [...planCats(),'기타'];
  catSel.innerHTML = cats.map(c=>`<option>${c}</option>`).join('');
  fillMfItem();
  catSel.onchange = fillMfItem;
}
function fillMfItem(){
  const c = document.getElementById('mfCat').value;
  const items = S.plan.filter(p=>p.kind==='지출'&&p.cat===c).map(p=>p.name);
  document.getElementById('mfItem').innerHTML = '<option value="">항목없음</option>'+items.map(n=>`<option>${n}</option>`).join('');
}
document.getElementById('mfAdd').addEventListener('click', async ()=>{
  const amt = Number(String(document.getElementById('mfAmt').value).replace(/,/g,''))||0;
  if(!amt){ toast('금액을 입력하세요'); return; }
  const row = {
    id: crypto.randomUUID(), month:S.inMonth,
    date: document.getElementById('mfDate').value || S.inMonth+'-01',
    cat: document.getElementById('mfCat').value,
    item: document.getElementById('mfItem').value,
    desc: document.getElementById('mfItem').value || document.getElementById('mfCat').value,
    amt, method:'현금',
    person: document.getElementById('mfPerson').value,
    source:'manual', memo: document.getElementById('mfMemo').value
  };
  loading(true);
  const res = await apiPost('addExpenses', [row]);
  loading(false);
  if(res.ok){ S.expenses.push(row); document.getElementById('mfAmt').value=''; document.getElementById('mfMemo').value=''; renderExpList(); renderReview(); toast('추가 완료'); }
  else toast('저장 실패: '+(res.detail||res.error||''));
});
document.getElementById('mfBulk').addEventListener('click', async ()=>{
  const cashPlans = S.plan.filter(p=>p.kind==='지출'&&p.method==='cash');
  if(!confirm(`계획된 현금 지출 ${cashPlans.length}건(총 ${won(cashPlans.reduce((a,p)=>a+p.amt,0))}원)을 ${S.inMonth.replace('-','.')}월에 일괄 등록할까요?`)) return;
  const rows = cashPlans.map(p=>({
    id: crypto.randomUUID(), month:S.inMonth, date:S.inMonth+'-01',
    cat:p.cat, item:p.name, desc:p.name, amt:p.amt, method:'현금',
    person: p.person==='common'?'dodo':p.person, source:'manual', memo:'계획 일괄등록'
  }));
  loading(true);
  const res = await apiPost('addExpenses', rows);
  loading(false);
  if(res.ok){ S.expenses.push(...rows); renderExpList(); renderReview(); toast(`${res.count}건 등록 완료`); }
  else toast('저장 실패');
});

function renderExpList(){
  const list = expOfMonth(S.inMonth).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('expCount').textContent = list.length?`· ${list.length}건 ${won(list.reduce((a,e)=>a+e.amt,0))}원`:'';
  const box = document.getElementById('expList');
  if(!list.length){ box.innerHTML='<div class="empty">입력된 내역이 없습니다</div>'; return; }
  box.innerHTML = list.map(e=>`
    <div class="exp-row">
      <span class="dt num">${e.date.slice(5)}</span>
      <span class="tag">${e.cat}${e.item?' · '+e.item:''}</span>
      <span class="ds">${e.desc}</span>
      <span class="dot ${e.person}"></span>
      <span class="am num">${won(e.amt)}</span>
      <button class="del" data-id="${e.id}">×</button>
    </div>`).join('');
  box.querySelectorAll('.del').forEach(bt=>{
    bt.addEventListener('click', async ()=>{
      if(!confirm('이 내역을 삭제할까요?')) return;
      loading(true);
      const res = await apiPost('deleteExpenses', [bt.dataset.id]);
      loading(false);
      if(res.ok){ S.expenses = S.expenses.filter(e=>e.id!==bt.dataset.id); renderExpList(); renderReview(); toast('삭제 완료'); }
    });
  });
}

/* ================= 자동 로그인 ================= */
if (S.pw) tryLogin(S.pw);
